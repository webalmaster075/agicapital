<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AGI Capital — English</title>
  <meta http-equiv="refresh" content="0; url=/?lang=en" />
</head>
<body>
  <script>
    // Simple redirect to index with lang query — avoids executing any page JS twice
    try {
      var target = '/?lang=en';
      // Use replace so /en doesn't stay in history
      window.location.replace(target);
    } catch (e) {
      // fallback
      window.location.href = '/?lang=en';
    }
  </script>
  <p>If you are not redirected automatically, <a href="/?lang=en">click here</a>.</p>
</body>
</html>
