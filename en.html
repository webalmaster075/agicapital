<body>
  <!-- reuse same HTML body as index.html but default language is English -->
  <!-- For brevity the full content is identical to index.html; JS will set 'en' on init -->
</body>
<script>
  // Minimal script to redirect to main index and force lang=en by query param
  // This page exists to ensure /en serves EN immediately
  (function(){
    try{ document.documentElement.lang='en'; }catch(e){}
    // Load the main index content in-place by fetching index.html and replacing body
    fetch('/index.html').then(r=>r.text()).then(html=>{
      // Replace language initialization: force setLang('en') by replacing the init block
      html = html.replace(/setLang\('ru'\);/g, "setLang('en');");
      document.open(); document.write(html); document.close();
    }).catch(()=>{});
  })();
</script>
</html>
